<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JEBBI GADGETS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header>
        <h1>JEBBI GADGETS</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Login to your account</p>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                    <span class="error-message" id="login-email-error"></span>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                    <span class="error-message" id="login-password-error"></span>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember-me" name="remember-me">
                    <label for="remember-me">Remember me</label>
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
            <p class="auth-link"><a href="#" class="forgot-password">Forgot password?</a></p>
        </div>
    </div>

    <div id="toast" class="toast">Message</div>

    <footer>
        <p>&copy; 2026 JEBBI GADGETS. All rights reserved.</p>
        <p>Contact: info@jebbigadgets.com</p>
    </footer>

    <script src="auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', loginUser);
    </script>
</body>
</html>
