<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEBBI GADGETS - Checkout Step 1: Shipping</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>JEBBI GADGETS</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#catalogue">Catalogue</a>
            <a href="index.html#cart" id="cart-link">Cart (<span id="cart-count">0</span>) - Total: $<span id="cart-total-header">0.00</span></a>
        </nav>
    </header>

    <section class="checkout-step">
        <div class="step-indicator">
            <div class="step active">1</div>
            <div class="step-line"></div>
            <div class="step">2</div>
            <div class="step-line"></div>
            <div class="step">3</div>
        </div>
        <h2>Shipping Information</h2>
        <form id="shipping-form">
            <input type="text" id="fullname" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <input type="text" id="address" placeholder="Delivery Address" required>
            <input type="text" id="city" placeholder="City" required>
            <div class="form-buttons">
                <button type="button" onclick="window.location.href='index.html'">Back to Cart</button>
                <button type="submit">Continue to Order Summary</button>
            </div>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 JEBBI GADGETS. All rights reserved.</p>
        <p>Contact: info@jebbigadgets.com</p>
    </footer>

    <script src="data.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
